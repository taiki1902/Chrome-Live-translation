<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Helium Live Translator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 36 36" role="img">
            <path d="M8 8v20M28 8v20M8 18h20" />
            <path class="accent" d="m13 25 5-14 5 14" />
          </svg>
        </div>
        <div>
          <h1>Live Translator</h1>
          <p>タブ音声を端末内で字幕化</p>
        </div>
        <div class="status-pill" id="statusPill" data-status="idle">
          <span class="status-dot"></span>
          <span id="statusLabel">停止中</span>
        </div>
      </header>

      <section class="panel local-panel">
        <div class="local-badge">LOCAL</div>
        <div>
          <b>APIキー・クラウド送信なし</b>
          <p>
            音声認識と翻訳はこのPCで実行します。初回のみモデルを取得します。
          </p>
        </div>
      </section>

      <section class="panel compact-grid" aria-label="翻訳言語">
        <label>
          <span>音声言語</span>
          <select id="sourceLanguage"></select>
        </label>
        <button
          class="swap-button"
          id="swapLanguages"
          title="言語を入れ替え"
          type="button"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="m7 7 3-3m-3 3 3 3M17 17l-3 3m3-3-3-3M8 7h8a3 3 0 0 1 3 3M16 17H8a3 3 0 0 1-3-3"
            />
          </svg>
        </button>
        <label>
          <span>字幕言語</span>
          <select id="targetLanguage"></select>
        </label>
      </section>

      <details class="panel advanced-panel">
        <summary>
          <span>モデル・字幕設定</span>
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="m6 8 4 4 4-4" />
          </svg>
        </summary>

        <div class="advanced-content">
          <div class="two-column">
            <label>
              <span>音声認識モデル</span>
              <select id="modelSize">
                <option value="tiny">Tiny・軽量</option>
                <option value="base">Base・高精度</option>
              </select>
            </label>
            <label>
              <span>実行デバイス</span>
              <select id="performanceMode">
                <option value="auto">自動</option>
                <option value="webgpu">GPU優先</option>
                <option value="wasm">CPU互換</option>
              </select>
            </label>
          </div>

          <label class="range-field">
            <span
              ><b>音声区間</b
              ><output id="segmentSecondsValue">6秒</output></span
            >
            <input id="segmentSeconds" type="range" min="4" max="12" step="1" />
          </label>

          <div class="two-column">
            <label>
              <span>字幕位置</span>
              <select id="position">
                <option value="bottom">画面下</option>
                <option value="top">画面上</option>
              </select>
            </label>
            <label>
              <span>文字サイズ</span>
              <input id="fontSize" type="number" min="18" max="48" step="1" />
            </label>
          </div>

          <label class="switch-row">
            <span>
              <b>認識結果も表示</b>
              <small>翻訳字幕の下に中間テキストを表示</small>
            </span>
            <input id="showOriginal" type="checkbox" role="switch" />
          </label>

          <label class="switch-row">
            <span>
              <b>無音区間をスキップ</b>
              <small>処理待ちを減らし、端末負荷を抑えます</small>
            </span>
            <input id="silenceGate" type="checkbox" role="switch" />
          </label>

          <label>
            <span>字幕置換辞書</span>
            <textarea
              id="customVocabulary"
              rows="2"
              maxlength="800"
              placeholder="例: Zenless Zone Zero=ゼンレスゾーンゼロ"
            ></textarea>
          </label>
        </div>
      </details>

      <div class="message" id="message" aria-live="polite"></div>

      <div class="actions">
        <button class="secondary-button" id="saveButton" type="button">
          設定を保存
        </button>
        <button class="primary-button" id="toggleButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path id="toggleIconPath" d="M8 5v14l11-7Z" />
          </svg>
          <span id="toggleButtonLabel">翻訳を開始</span>
        </button>
      </div>

      <footer>
        <span
          ><kbd>Alt</kbd><span>+</span><kbd>Shift</kbd><span>+</span
          ><kbd>L</kbd></span
        >
        <a
          href="https://github.com/taiki1902/Chrome-Live-translation"
          target="_blank"
          rel="noreferrer"
          >GitHub</a
        >
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
