<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Helium Live Translator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 36 36" role="img">
            <path d="M8 8v20M28 8v20M8 18h20" />
            <path class="accent" d="m13 25 5-14 5 14" />
          </svg>
        </div>
        <div>
          <h1>Live Translator</h1>
          <p>タブ音声を翻訳字幕へ</p>
        </div>
        <div class="status-pill" id="statusPill" data-status="idle">
          <span class="status-dot"></span>
          <span id="statusLabel">停止中</span>
        </div>
      </header>

      <section class="panel compact-grid" aria-label="翻訳言語">
        <label>
          <span>音声言語</span>
          <select id="sourceLanguage"></select>
        </label>
        <button
          class="swap-button"
          id="swapLanguages"
          title="言語を入れ替え"
          type="button"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="m7 7 3-3m-3 3 3 3M17 17l-3 3m3-3-3-3M8 7h8a3 3 0 0 1 3 3M16 17H8a3 3 0 0 1-3-3"
            />
          </svg>
        </button>
        <label>
          <span>字幕言語</span>
          <select id="targetLanguage"></select>
        </label>
      </section>

      <section class="panel api-panel">
        <div class="field-heading">
          <label for="apiKey">OpenAI APIキー</label>
          <span>端末内だけに保存</span>
        </div>
        <div class="secret-field">
          <input
            id="apiKey"
            type="password"
            autocomplete="off"
            spellcheck="false"
            placeholder="sk-..."
          />
          <button id="toggleApiKey" type="button" aria-label="APIキーを表示">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
              />
              <circle cx="12" cy="12" r="2.8" />
            </svg>
          </button>
        </div>
        <p class="helper">
          音声・字幕テキストは、あなたのAPIキーでOpenAIへ直接送信されます。
        </p>
      </section>

      <details class="panel advanced-panel">
        <summary>
          <span>字幕・精度設定</span>
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="m6 8 4 4 4-4" />
          </svg>
        </summary>

        <div class="advanced-content">
          <label class="range-field">
            <span
              ><b>音声区間</b
              ><output id="segmentSecondsValue">4秒</output></span
            >
            <input id="segmentSeconds" type="range" min="3" max="10" step="1" />
          </label>

          <div class="two-column">
            <label>
              <span>字幕位置</span>
              <select id="position">
                <option value="bottom">画面下</option>
                <option value="top">画面上</option>
              </select>
            </label>
            <label>
              <span>文字サイズ</span>
              <input id="fontSize" type="number" min="18" max="48" step="1" />
            </label>
          </div>

          <label class="switch-row">
            <span>
              <b>原文も表示</b>
              <small>翻訳字幕の下に文字起こしを表示</small>
            </span>
            <input id="showOriginal" type="checkbox" role="switch" />
          </label>

          <label class="switch-row">
            <span>
              <b>無音区間をスキップ</b>
              <small>API利用量を抑えるため無音を送信しない</small>
            </span>
            <input id="silenceGate" type="checkbox" role="switch" />
          </label>

          <label>
            <span>固有名詞・専門語</span>
            <textarea
              id="customVocabulary"
              rows="2"
              maxlength="800"
              placeholder="例: Zenless Zone Zero, 星見雅, RainStella"
            ></textarea>
          </label>

          <div class="two-column models">
            <label>
              <span>文字起こしモデル</span>
              <input id="transcriptionModel" type="text" spellcheck="false" />
            </label>
            <label>
              <span>翻訳モデル</span>
              <input id="translationModel" type="text" spellcheck="false" />
            </label>
          </div>
        </div>
      </details>

      <div class="message" id="message" aria-live="polite"></div>

      <div class="actions">
        <button class="secondary-button" id="saveButton" type="button">
          設定を保存
        </button>
        <button class="primary-button" id="toggleButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path id="toggleIconPath" d="M8 5v14l11-7Z" />
          </svg>
          <span id="toggleButtonLabel">翻訳を開始</span>
        </button>
      </div>

      <footer>
        <span
          >ショートカット <kbd>Alt</kbd><span>+</span><kbd>Shift</kbd
          ><span>+</span><kbd>L</kbd></span
        >
        <a
          href="https://github.com/taiki1902/Chrome-Live-translation"
          target="_blank"
          rel="noreferrer"
          >GitHub</a
        >
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
