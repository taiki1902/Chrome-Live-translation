name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: helium-live-translator-extension
          path: dist/helium-live-translator-*.zip
