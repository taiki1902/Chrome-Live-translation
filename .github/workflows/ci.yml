name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npm run check
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: helium-live-translator-extension
          path: dist/helium-live-translator-*.zip
