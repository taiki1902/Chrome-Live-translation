name: Bootstrap repository

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap.yml
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore and verify source archive
        shell: bash
        run: |
          cat _bootstrap/part-* | base64 --decode > /tmp/helium-live-translator.zip
          echo "331702a3466ac60dc76120f70fbba24f9637a4eaf483d542ae508ff36b21960e  /tmp/helium-live-translator.zip" | sha256sum --check
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          unzip -q /tmp/helium-live-translator.zip -d .

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run quality checks
        run: npm run check

      - name: Build distributable extension
        run: npm run build

      - name: Publish clean main branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          tree_sha="$(git write-tree)"
          commit_sha="$(printf '%s\n' 'feat: add Helium live translation extension' | git commit-tree "$tree_sha")"
          git push --force origin "$commit_sha:refs/heads/main"
