name: Release v0.1.0 Full Audio E2E

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/release-e2e-v0.1.0-pulse.yml

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare browser and virtual audio device
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq espeak xvfb unzip xdotool pulseaudio pulseaudio-utils

          export XDG_RUNTIME_DIR="/tmp/hlt-runtime-${UID}"
          export PULSE_SERVER="unix:${XDG_RUNTIME_DIR}/pulse/native"
          mkdir -p "${XDG_RUNTIME_DIR}"
          chmod 700 "${XDG_RUNTIME_DIR}"
          echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> "${GITHUB_ENV}"
          echo "PULSE_SERVER=${PULSE_SERVER}" >> "${GITHUB_ENV}"

          pulseaudio --kill >/dev/null 2>&1 || true
          pulseaudio --daemonize=yes --exit-idle-time=-1 --log-target=file:/tmp/hlt-pulseaudio.log
          for _ in $(seq 1 20); do
            pactl info >/dev/null 2>&1 && break
            sleep 0.25
          done
          pactl load-module module-null-sink sink_name=hlt_sink sink_properties=device.description=HLT_Test_Sink
          pactl set-default-sink hlt_sink
          pactl set-default-source hlt_sink.monitor
          pactl info
          pactl list short sinks
          pactl list short sources

          mkdir -p /tmp/hlt-e2e
          cd /tmp/hlt-e2e
          npm init -y >/dev/null
          npm install --silent playwright@1.55.0
          npx playwright install --with-deps chromium

          curl -L --fail --retry 3 \
            -o release.zip \
            https://github.com/taiki1902/Chrome-Live-translation/releases/download/v0.1.0/helium-live-translator-v0.1.0.zip
          unzip -q release.zip -d extension
          echo "Release SHA-256: $(sha256sum release.zip | cut -d' ' -f1)"
          node -e "const m=require('/tmp/hlt-e2e/extension/manifest.json'); if(m.version!=='0.1.0') process.exit(1); console.log(m.name,m.version,m.permissions,m.host_permissions)"

      - name: Create subtitle-less audio fixture
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/hlt-e2e
          espeak -s 145 -w speech.wav \
            "Hello. This is a complete browser extension test. The live translator should recognize this English speech and translate it into Japanese subtitles. We are testing tab audio capture, local speech recognition, and local translation."
          cat > test.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <link rel="icon" href="data:,">
              <title>Subtitle-less audio test</title>
              <style>
                body { background: #10131c; color: white; font-family: sans-serif; padding: 40px; }
                h1 { font-size: 36px; }
                p { font-size: 22px; }
                audio { width: 700px; }
              </style>
            </head>
            <body>
              <h1>Subtitle-less audio test</h1>
              <p>This page contains spoken audio but no caption or subtitle track.</p>
              <audio id="audio" src="/speech.wav" controls loop autoplay></audio>
              <script>audio.play().catch(() => undefined);</script>
            </body>
          </html>
          EOF

      - name: Write full browser E2E runner
        shell: bash
        run: |
          cat > /tmp/hlt-e2e/e2e.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          import { execFileSync } from 'node:child_process';

          const log = (...values) => console.log(new Date().toISOString(), ...values);
          const extensionPath = '/tmp/hlt-e2e/extension';
          const context = await chromium.launchPersistentContext('/tmp/hlt-e2e/profile', {
            headless: false,
            args: [
              `--disable-extensions-except=${extensionPath}`,
              `--load-extension=${extensionPath}`,
              '--autoplay-policy=no-user-gesture-required',
              '--no-sandbox',
              '--disable-dev-shm-usage',
              '--use-fake-ui-for-media-stream',
            ],
            ignoreDefaultArgs: ['--disable-extensions'],
          });

          context.on('weberror', (event) => {
            const error = event.error();
            log('WEBERROR', error?.stack || error?.message || String(error));
          });

          let worker = context.serviceWorkers()[0];
          if (!worker) worker = await context.waitForEvent('serviceworker', { timeout: 30_000 });
          worker.on('console', (message) => log('SW_CONSOLE', message.type(), message.text()));

          const extensionId = new URL(worker.url()).host;
          const manifest = await worker.evaluate(() => chrome.runtime.getManifest());
          const commands = await worker.evaluate(() => chrome.commands.getAll());
          const command = commands.find((entry) => entry.name === 'toggle-translation');
          log('EXTENSION', extensionId, JSON.stringify({ name: manifest.name, version: manifest.version }));
          log('COMMAND', JSON.stringify(command));
          if (command?.shortcut !== 'Alt+Shift+L') throw new Error('Extension shortcut was not registered');

          const page = await context.newPage();
          page.on('console', (message) => log('PAGE_CONSOLE', message.type(), message.text()));
          page.on('pageerror', (error) => log('PAGE_ERROR', error.stack || error.message));
          await page.goto('http://127.0.0.1:8123/test.html');
          await page.bringToFront();
          await page.locator('#audio').evaluate((audio) => audio.play());
          const audioState = await page.locator('#audio').evaluate((audio) => ({
            paused: audio.paused,
            readyState: audio.readyState,
            duration: audio.duration,
          }));
          log('AUDIO_STATE', JSON.stringify(audioState));
          if (audioState.paused || audioState.readyState < 2) throw new Error('Fixture audio did not play');

          const settings = {
            sourceLanguage: 'en',
            targetLanguage: 'ja',
            modelSize: 'tiny',
            performanceMode: 'wasm',
            segmentSeconds: 4,
            overlapMilliseconds: 700,
            showOriginal: true,
            translationEnabled: true,
            fontSize: 27,
            backgroundOpacity: 0.76,
            position: 'bottom',
            maxCaptionRows: 3,
            captionLifetimeSeconds: 30,
            silenceGate: false,
            silenceThreshold: 0.003,
            customVocabulary: '',
          };
          await worker.evaluate(async (value) => chrome.storage.local.set({ settings: value }), settings);

          const readState = () => worker.evaluate(async () => {
            const result = await chrome.storage.session.get('runtimeState');
            return result.runtimeState || null;
          });

          const windows = execFileSync('xdotool', [
            'search', '--onlyvisible', '--name', 'Subtitle-less audio test',
          ], { encoding: 'utf8' }).trim().split(/\s+/).filter(Boolean);
          if (!windows.length) throw new Error('Chromium X11 window was not found');
          const windowId = windows.at(-1);
          log('X11_WINDOW', windowId, execFileSync('xdotool', ['getwindowname', windowId], { encoding: 'utf8' }).trim());
          execFileSync('xdotool', ['windowfocus', '--sync', windowId]);
          execFileSync('xdotool', ['key', '--window', windowId, '--clearmodifiers', 'alt+shift+l']);
          log('START_SHORTCUT_SENT');

          let state = null;
          let last = '';
          const deadline = Date.now() + 18 * 60_000;
          while (Date.now() < deadline) {
            state = await readState();
            const serialized = JSON.stringify(state);
            if (serialized !== last) {
              log('STATE', serialized);
              last = serialized;
            }
            if (state?.status === 'error') throw new Error(`Runtime error: ${state.lastError}`);
            if (state?.captionCount > 0) break;
            await new Promise((resolve) => setTimeout(resolve, 2_000));
          }
          if (!state?.captionCount) throw new Error(`No caption produced: ${JSON.stringify(state)}`);

          const overlayCount = await page.locator('#helium-live-translator-root').count();
          log('OVERLAY_COUNT', overlayCount);
          if (overlayCount !== 1) throw new Error('Subtitle overlay was not injected');
          await page.screenshot({ path: '/tmp/hlt-e2e/e2e-result.png', fullPage: true });
          log('SCREENSHOT_SIZE', fs.statSync('/tmp/hlt-e2e/e2e-result.png').size);
          log('E2E_PASS', JSON.stringify(state));

          execFileSync('xdotool', ['windowfocus', '--sync', windowId]);
          execFileSync('xdotool', ['key', '--window', windowId, '--clearmodifiers', 'alt+shift+l']);
          const stopDeadline = Date.now() + 15_000;
          let stopped = await readState();
          while (Date.now() < stopDeadline && stopped?.status !== 'idle') {
            await new Promise((resolve) => setTimeout(resolve, 500));
            stopped = await readState();
          }
          log('STOP_STATE', JSON.stringify(stopped));
          if (stopped?.status !== 'idle') throw new Error('Extension did not stop cleanly');
          await context.close();
          EOF

      - name: Run full audio capture and model E2E
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/hlt-e2e
          pactl info
          pactl list short sinks
          python3 -m http.server 8123 --directory /tmp/hlt-e2e >http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          xvfb-run -a node e2e.mjs 2>&1 | tee e2e.log

      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-v0.1.0-full-audio-e2e
          if-no-files-found: warn
          path: |
            /tmp/hlt-e2e/e2e.log
            /tmp/hlt-e2e/http.log
            /tmp/hlt-e2e/e2e-result.png
            /tmp/hlt-e2e/release.zip
            /tmp/hlt-pulseaudio.log
