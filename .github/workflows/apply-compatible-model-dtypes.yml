name: Apply compatible model dtypes

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-compatible-model-dtypes.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Replace fragile q4/q8 model variants
        shell: python
        run: |
          import re
          from pathlib import Path

          path = Path('src/offscreen/offscreen.js')
          text = path.read_text(encoding='utf-8')
          original = text

          replacements = {
              '{ device: "webgpu", dtype: "q4" }': '{ device: "webgpu", dtype: "fp16" }',
              '{ device: "webgpu" }': '{ device: "webgpu", dtype: "fp32" }',
              '{ device: "wasm", dtype: "q8" }': '{ device: "wasm", dtype: "int8" }',
              '{ device: "wasm" }': '{ device: "wasm", dtype: "fp32" }',
              '...(device === "webgpu" ? { dtype: "q4" } : { dtype: "q8" }),': 'dtype: device === "webgpu" ? "fp16" : "int8",',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)

          text, fallback_count = re.subn(
              r'(\.catch\(async \(\) =>\s*\n\s*pipeline\("translation", LOCAL_TRANSLATION_MODEL, \{\s*\n\s*device,\s*\n)(\s*progress_callback:)',
              r'\1        dtype: "fp32",\n\2',
              text,
              count=1,
          )

          if text == original:
              raise SystemExit('No dtype replacements were applied')
          if 'dtype: "q4"' in text or 'dtype: "q8"' in text:
              raise SystemExit('Fragile q4/q8 dtype remains in offscreen.js')
          if fallback_count != 1:
              raise SystemExit(f'Expected one fp32 translator fallback, found {fallback_count}')

          path.write_text(text, encoding='utf-8')

      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run format
      - run: npm run check
      - run: npm run build

      - name: Commit tested dtype fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/offscreen/offscreen.js
          if ! git diff --cached --quiet; then
            git commit -m "fix: use compatible local model dtypes"
            git push origin HEAD:${{ github.head_ref }}
          fi
