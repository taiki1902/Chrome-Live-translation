name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
body:
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Expected and actual result
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed API keys and private transcript/audio data.
          required: true
